name: Update RSS Feed

on:
  schedule:
    - cron: "*/5 * * * *"   # every 5 minutes
  workflow_dispatch:

jobs:
  update-feed:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v3

      - name: Fetch RSS and convert to JSON
        run: |
          curl -s https://feeds.feedburner.com/TheHackersNews -o feed.xml

          python3 <<EOF
import xml.etree.ElementTree as ET
import json

tree = ET.parse("feed.xml")
root = tree.getroot()

items = []

for item in root.findall(".//item")[:10]:
    title = item.find("title").text if item.find("title") is not None else ""
    link = item.find("link").text if item.find("link") is not None else ""
    date = item.find("pubDate").text if item.find("pubDate") is not None else ""

    severity = "LOW"
    t = title.lower()

    if "ransomware" in t or "breach" in t:
        severity = "CRITICAL"
    elif "exploit" in t or "zero-day" in t:
        severity = "HIGH"
    elif "phishing" in t:
        severity = "MEDIUM"

    items.append({
        "title": title,
        "link": link,
        "date": date,
        "severity": severity
    })

with open("feed.json", "w") as f:
    json.dump(items, f, indent=2)
EOF

      - name: Commit updated feed
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add feed.json
          git commit -m "Update feed" || echo "No changes"
          git push
